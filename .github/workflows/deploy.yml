name: Deploy to production Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}          

      - name: Deploy standalone build
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ./.next/standalone/
          remote_path: /var/www/admin.chatlivo.com
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: 22
          legacy_allow_rsa_hostkeys: true

      - name: Deploy static assets
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ./.next/static/
          remote_path: /var/www/admin.chatlivo.com/.next/static/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: 22
          legacy_allow_rsa_hostkeys: true

      - name: Deploy public folder
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path: ./public/
          remote_path: /var/www/admin.chatlivo.com/public/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: 22
          legacy_allow_rsa_hostkeys: true

      - name: Restart app on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
              cd /var/www/admin.chatlivo.com
              if pm2 describe admin-chatlivo > /dev/null; then
                pm2 restart admin-chatlivo --update-env
              else
                PORT=3003 NODE_ENV=production pm2 start server.js --name admin-chatlivo
              fi
              pm2 save
              echo "Deployment complete!"
